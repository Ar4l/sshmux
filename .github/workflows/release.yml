name: release

# Build prebuilt `sshmux` CLI binaries for each platform and attach them to the
# GitHub release for the pushed tag, so `brew install` downloads a ready binary
# instead of compiling from source (no rust/cc/linker needed on the user's box).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # musl builds (both x86_64 and aarch64) are produced with cargo-zigbuild:
      # zig supplies the C compiler + linker, so we don't depend on apt's
      # musl-tools package (the arm64 mirror ports.ubuntu.com is unreliable and
      # the aarch64 job previously failed fetching musl-tools with exit 100).
      - name: Set up cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: mlugg/setup-zig@v2
        if: contains(matrix.target, 'linux-musl')
      - name: Build (CLI only, static on musl)
        if: contains(matrix.target, 'linux-musl')
        run: cargo zigbuild --release -p sshmux-cli --target ${{ matrix.target }}
      - name: Build (CLI only)
        if: ${{ !contains(matrix.target, 'linux-musl') }}
        run: cargo build --release -p sshmux-cli --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf sshmux-${{ matrix.target }}.tar.gz sshmux
          shasum -a 256 sshmux-${{ matrix.target }}.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: sshmux-${{ matrix.target }}.tar.gz
