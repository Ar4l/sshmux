name: release

# Build prebuilt `sshmux` CLI binaries for each platform and attach them to the
# GitHub release for the pushed tag, so `brew install` downloads a ready binary
# instead of compiling from source (no rust/cc/linker needed on the user's box).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build (CLI only, static on musl)
        run: cargo build --release -p sshmux-cli --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf sshmux-${{ matrix.target }}.tar.gz sshmux
          shasum -a 256 sshmux-${{ matrix.target }}.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: sshmux-${{ matrix.target }}.tar.gz
