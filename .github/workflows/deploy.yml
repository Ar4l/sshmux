name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Override the macOS Homebrew paths in .cargo/config.toml ([env] there does
  # not clobber pre-set variables). Ubuntu runners ship clang; llvm-ar is
  # installed below if missing.
  CC_wasm32_unknown_unknown: clang
  AR_wasm32_unknown_unknown: llvm-ar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to immutable commit SHAs (supply-chain hardening).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Ensure llvm-ar
        run: which llvm-ar || (sudo apt-get update && sudo apt-get install -y llvm)
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: trunk
      - run: trunk build --release --public-url /sshmux/
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
