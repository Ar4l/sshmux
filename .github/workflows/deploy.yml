name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Override the macOS Homebrew paths in .cargo/config.toml ([env] there does
  # not clobber pre-set variables). Ubuntu runners ship clang; llvm-ar is
  # installed below if missing.
  CC_wasm32_unknown_unknown: clang
  AR_wasm32_unknown_unknown: llvm-ar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Ensure llvm-ar
        run: which llvm-ar || (sudo apt-get update && sudo apt-get install -y llvm)
      - uses: jetli/trunk-action@v0.5
        with:
          version: "latest"
      - run: trunk build --release --public-url /sshmux/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
